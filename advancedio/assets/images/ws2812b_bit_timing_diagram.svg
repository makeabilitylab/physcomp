<svg width="100%" viewBox="0 0 680 290" role="img" style="font-family: monospace;" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">WS2812B bit timing diagram</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">Shows how the WS2812B protocol encodes a 1 bit with a long HIGH pulse and a 0 bit with a short HIGH pulse, each within a fixed 1.25 microsecond period.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section divider lines — full height, more visible -->
  <line x1="60" y1="10" x2="60" y2="248" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="4 3" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.3);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="310" y1="10" x2="310" y2="248" stroke="var(--color-border-secondary)" stroke-width="1" stroke-dasharray="5 3" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.3);color:rgb(0, 0, 0);stroke-width:1px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="560" y1="10" x2="560" y2="248" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="4 3" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.3);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Transition guidelines (shorter, near waveform only) -->
  <line x1="220" y1="78" x2="220" y2="200" stroke="var(--color-border-secondary)" stroke-width="0.6" stroke-dasharray="3 3" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.3);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-dasharray:3px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="390" y1="78" x2="390" y2="200" stroke="var(--color-border-secondary)" stroke-width="0.6" stroke-dasharray="3 3" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.3);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-dasharray:3px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Section headers -->
  <text x="185" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="var(--color-text-primary)" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">The 1 bit encoding</text>
  <text x="435" y="28" text-anchor="middle" font-size="14" font-weight="500" fill="var(--color-text-primary)" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">The 0 bit encoding</text>

  <!-- 0V baseline -->
  <line x1="50" y1="170" x2="570" y2="170" stroke="var(--color-border-tertiary)" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.15);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- 5V gridline -->
  <line x1="50" y1="80" x2="570" y2="80" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.15);color:rgb(0, 0, 0);stroke-width:0.5px;stroke-dasharray:4px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Axis labels -->
  <text x="42" y="174" text-anchor="end" font-size="12" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">0V</text>
  <text x="42" y="84" text-anchor="end" font-size="12" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">5V</text>

  <!-- Light blue fill for HIGH portions -->
  <rect x="60" y="80" width="160" height="90" fill="#2979ff" opacity="0.1" style="fill:rgb(41, 121, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="310" y="80" width="80" height="90" fill="#2979ff" opacity="0.1" style="fill:rgb(41, 121, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Waveform -->
  <path d="M 60,170 L 60,80 L 220,80 L 220,170 L 310,170 L 310,80 L 390,80 L 390,170 L 560,170" fill="none" stroke="#2979ff" stroke-width="3" stroke-linejoin="round" style="fill:none;stroke:rgb(41, 121, 255);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- T1H label and arrow — label well above the arrow line -->
  <text x="140" y="48" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">T1H: ~0.8µs</text>
  <line x1="62" y1="58" x2="218" y2="58" stroke="var(--color-text-secondary)" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- T1L arrow -->
  <line x1="222" y1="192" x2="308" y2="192" stroke="var(--color-text-secondary)" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="265" y="212" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">T1L: ~0.45µs</text>

  <!-- T0H label and arrow — label well above the arrow line -->
  <text x="350" y="48" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">T0H: ~0.4µs</text>
  <line x1="312" y1="58" x2="388" y2="58" stroke="var(--color-text-secondary)" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- T0L arrow -->
  <line x1="392" y1="192" x2="558" y2="192" stroke="var(--color-text-secondary)" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="475" y="212" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">T0L: ~0.85µs</text>

  <!-- Period brackets -->
  <line x1="60" y1="248" x2="310" y2="248" stroke="var(--color-text-secondary)" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="185" y="268" text-anchor="middle" font-size="12" font-weight="500" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:12px;font-weight:500;text-anchor:middle;dominant-baseline:auto">1 period = 1.25µs</text>

  <line x1="310" y1="248" x2="560" y2="248" stroke="var(--color-text-secondary)" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="435" y="268" text-anchor="middle" font-size="12" font-weight="500" fill="var(--color-text-secondary)" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:12px;font-weight:500;text-anchor:middle;dominant-baseline:auto">1 period = 1.25µs</text>

  <!-- Continuation hint -->
  <text x="580" y="174" font-size="14" fill="var(--color-text-tertiary)" style="fill:rgb(115, 114, 108);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">···</text>
</svg>